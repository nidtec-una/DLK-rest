project_root

line_length: 120
regex_function_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_script_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_parameter_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_class_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_method_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"

exclude_dir: ".git"
exclude_dir: ".github"
exclude_dir: "data"
exclude_dir: "results"

suppress_rule: "copyright_notice"
suppress_rule: "naming_functions"
suppress_rule: "line_length"
suppress_rule: "unicode"
suppress_rule: "naming_parameters"
suppress_rule: "indentation"
suppress_rule: "file_length"
suppress_rule: "operator_after_continuation"
