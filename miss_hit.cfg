project_root: ""
line_length: 120
regex_function_name: "[a-z]+(_[a-zA-Z0-9]+)*"
regex_script_name: "[a-z]+(_[a-zA-Z0-9]+)*"
regex_parameter_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_class_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_property_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"
regex_method_name: "[a-zA-Z]+(_[a-zA-Z0-9]+)*"

exclude_dir:
  - ".git"
  - ".github"
  - "data"
  - "tests/results"
